<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 350" role="img" aria-label="Field Marshal Bernard Montgomery Commander Card">
  <defs>
    <linearGradient id="monty-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E293B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F172A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Card background -->
  <rect width="250" height="350" fill="url(#monty-bg)" stroke="#8B5CF6" stroke-width="3" rx="12"/>

  <!-- Stars rating -->
  <text x="125" y="25" font-family="system-ui" font-size="16" fill="#D4A574" text-anchor="middle">⭐⭐⭐⭐⭐</text>

  <!-- Name -->
  <text x="125" y="50" font-family="system-ui" font-size="13" fill="#F8FAFC" text-anchor="middle" font-weight="bold">BERNARD MONTGOMERY</text>
  <text x="125" y="68" font-family="system-ui" font-size="12" fill="#94A3B8" text-anchor="middle">Field Marshal (5-Star)</text>

  <!-- Portrait placeholder -->
  <rect x="75" y="80" width="100" height="100" fill="#334155" stroke="#D4A574" stroke-width="2" rx="8"/>
  <text x="125" y="135" font-family="system-ui" font-size="48" text-anchor="middle">🎭</text>

  <!-- Personality type -->
  <rect x="15" y="195" width="220" height="30" fill="#8B5CF6" rx="6"/>
  <text x="125" y="215" font-family="system-ui" font-size="12" fill="#0F172A" text-anchor="middle" font-weight="bold">⚙️ MULTI-FORCE COORDINATOR</text>

  <!-- Stats -->
  <text x="125" y="240" font-family="system-ui" font-size="11" fill="#94A3B8" text-anchor="middle">XP: 375 | Deployments: 5</text>

  <!-- Traits -->
  <g transform="translate(25, 255)">
    <text x="0" y="0" font-family="system-ui" font-size="12" fill="#D4A574" font-weight="600">TRAITS:</text>
    <text x="0" y="18" font-family="system-ui" font-size="10" fill="#F8FAFC">📋 Meticulous planning</text>
    <text x="0" y="33" font-family="system-ui" font-size="10" fill="#F8FAFC">🎯 Set-piece operations</text>
    <text x="0" y="48" font-family="system-ui" font-size="10" fill="#10B981">✓ Parallel coordination</text>
  </g>

  <!-- Best for -->
  <g transform="translate(25, 310)">
    <text x="0" y="0" font-family="system-ui" font-size="12" fill="#D4A574" font-weight="600">BEST FOR:</text>
    <text x="0" y="16" font-family="system-ui" font-size="9" fill="#10B981">• Multi-commander ops</text>
    <text x="0" y="29" font-family="system-ui" font-size="9" fill="#10B981">• Campaign coordination</text>
  </g>
</svg>